<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Typing Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Logo -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Style -->
    <link rel="stylesheet" href="./style.css">

</head>

<body class="bg-[#F8FAFC]">

    <nav class="navbar bg-[#FFFFFF] shadow-sm flex flex-col md:flex-row justify-between items-center">
        <div class="pl-7">
            <a class="btn btn-ghost text-xl text-[#1F2937]"><img class="h-7" src="./assets/github-logo.png"
                    alt="">Github Issues Tracker</a>
        </div>
        <div class="pr-7">
            <ul class="menu menu-horizontal px-1 gap-2 items-center">
                <div class="relative w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" placeholder="Search issues..." class="w-full pl-10 pr-3 py-2 rounded-md" />
                </div>
                <li>
                    <div class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</div>
                </li>
            </ul>
        </div>
    </nav>

    <section class="bg-[#F8FAFC] flex justify-center">

        <div class="w-full md:w-7/10 mx-auto">

            <section class="bg-[#FFFFFF] mt-10 mb-3 shadow-sm flex gap-2 justify-start p-3">
                <div class="btn btn-primary">All</div>
                <div id="status-open" class="btn">Open</div>
                <div id="status-closed" class="btn">Closed</div>
            </section>

            <section class="bg-[#FBFBFB] shadow-sm gap-2">
                <div class="flex bg-[#FFFFFF] justify-between p-3">
                    <div class="flex gap-3 items-center">
                        <a class="p-2 bg-slate-300 rounded-full" href=""><img class="h-5" src="./assets/Aperture.png"
                                alt=""></a>
                        <div class="">
                            <h2 class="font-semibold">50 Issues</h2>
                            <p class="text-[#64748B] text-sm">Track and manage your project issues</p>
                        </div>

                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-1">
                            <span class="w-3 h-3 bg-[#00A96E] rounded-full"></span>
                            <span>Open</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                            <span>Closed</span>
                        </div>
                    </div>
                </div>
                <hr class=" opacity-30">

                <div id="card-container" class="mt-3 gap-4 m-2 grid grid-cols-4">

                </div>

                <div id="popup-card-container" class="">
                    
                </div>

            </section>



        </div>
    </section>

    <!-- Script: JS files -->
    <script src="./script/index.js"></script>
</body>

</html>
